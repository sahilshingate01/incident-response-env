name: incident-response-env
version: "1.0.0"
description: "Production incident response simulation. An AI agent receives system alerts and must diagnose and remediate production failures across a 5-service microservice architecture."
url: "https://sahilshingate-incident-response-env.hf.space"
author: "Sahil Shingate"
license: "MIT"
tags:
  - openenv
  - incident-response
  - sre
  - reinforcement-learning
  - llm-evaluation

environment:
  type: text
  observation_space:
    type: object
    fields:
      observation_text: {type: string, description: "Human-readable output from the last action"}
      services_summary: {type: object, description: "Status of all 5 services with error_rate and latency_p99_ms"}
      available_actions: {type: array, description: "Valid action hints for the agent"}
      step_count: {type: integer}
      incident_description: {type: string}
      done: {type: boolean}
      reward: {type: float}
      metadata: {type: object, description: "episode_id, cumulative_reward, diagnosis_state, reward_reasoning, seed"}
  action_space:
    type: object
    fields:
      action_type: {type: string, enum: [read_logs, check_metrics, check_all_services, check_recent_deploys, check_db_queries, rollback, restart_service, scale_up, declare_resolved]}
      target: {type: string, nullable: true, description: "Service name or deploy ID depending on action"}
      task_name: {type: string, description: "Active task name"}

endpoints:
  health: {method: GET, path: /health}
  reset: {method: POST, path: /reset}
  reset_task: {method: POST, path: "/reset/{task_name}"}
  step: {method: POST, path: /step}
  grade: {method: POST, path: /grade}
  tasks: {method: GET, path: /tasks}
  state: {method: GET, path: /state}

tasks:
  - name: single_service_failure
    difficulty: easy
    description: "A bad deploy to user-service causes 40-80% error rate. Agent must check recent deploys, read logs, and rollback."
    max_steps: 15
    success_threshold: 0.5
    max_possible_reward: 1.70

  - name: database_latency
    difficulty: medium
    description: "DB primary overloaded with 498/500 connections. Agent must trace latency from api-gateway upstream to db-primary and scale up."
    max_steps: 15
    success_threshold: 0.6
    max_possible_reward: 1.90

  - name: cascade_failure
    difficulty: hard
    description: "Full cascade failure: DB connection pool exhaustion → payment timeouts → API retry storm. Fix order matters."
    max_steps: 15
    success_threshold: 0.7
    max_possible_reward: 2.50

  - name: memory_leak_oom
    difficulty: medium
    description: "user-service has a memory leak causing gradual OOM. Agent must read logs, check metrics, and restart the service."
    max_steps: 15
    success_threshold: 0.5
    max_possible_reward: 1.70

grading:
  method: POST
  path: /grade
  score_range: [0.0, 1.0]
  score_field: score
  pass_field: passed
